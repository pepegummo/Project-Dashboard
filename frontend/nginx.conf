# ── Upstream definitions ──────────────────────────────────────────────────────
# These hostnames resolve inside the Docker network (service names in compose).
# For local dev without Docker, change to 127.0.0.1.
upstream backend_api {
  server backend:4000;
  keepalive 32;
}

upstream backend_ws {
  server backend:4000;
}

# ── Main server block ─────────────────────────────────────────────────────────
server {
  listen      80;
  server_name _;

  root  /usr/share/nginx/html;
  index index.html;

  # ── Security headers ───────────────────────────────────────────────────────
  add_header X-Frame-Options        "SAMEORIGIN"   always;
  add_header X-Content-Type-Options "nosniff"      always;
  add_header X-XSS-Protection       "1; mode=block" always;
  add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

  # ── Compression ────────────────────────────────────────────────────────────
  gzip            on;
  gzip_vary       on;
  gzip_min_length 1024;
  gzip_proxied    any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml
    font/woff2;

  # ── REST API reverse proxy  →  backend:4000 ────────────────────────────────
  # All requests to /api/* are forwarded to the Express backend.
  # Because the browser sends requests to the *same origin* as the frontend,
  # the backend needs NO CORS headers for these routes.
  location /api/ {
    proxy_pass         http://backend_api;
    proxy_http_version 1.1;

    # Forward real client info to the backend
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Keep-alive for connection reuse
    proxy_set_header Connection "";

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;
    proxy_send_timeout    30s;

    # Don't buffer large uploads (e.g. dashboard thumbnails)
    proxy_request_buffering off;
  }

  # ── WebSocket reverse proxy  →  backend:4000 ──────────────────────────────
  # WS is now on the same port as REST (/ws route via Fiber).
  # VITE_WS_URL in the frontend build must point here:
  #   ws://localhost:5173/ws  (or wss://yourdomain.com/ws with TLS)
  location /ws {
    proxy_pass         http://backend_ws;
    proxy_http_version 1.1;

    # Required WebSocket upgrade headers
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host       $host;
    proxy_set_header X-Real-IP  $remote_addr;

    # Keep WebSocket connections alive (must be > client ping interval)
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;

    # Disable buffering for real-time frames
    proxy_buffering off;
  }

  # ── Static asset cache ─────────────────────────────────────────────────────
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
    expires    1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # ── SPA fallback ───────────────────────────────────────────────────────────
  # All non-matched routes serve index.html so Vue Router handles them.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
